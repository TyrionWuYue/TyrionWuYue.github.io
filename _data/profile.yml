short_bio: >-
  <p>
    Hi! I am Yue Wu (武越 in Chinese). I am a first-year Ph.D. student at Shanghai Innovation Institute and Tongji University, 
    advised by Prof. <a href="https://scholar.google.com/citations?user=4N5hE8YAAAAJ" target="_blank">Kairui Feng</a>, 
    co-advised by Prof. <a href="https://scholar.google.com/citations?user=UuCqlfEAAAAJ&hl=zh-CN" target="_blank">Xuanhong Chen</a>. 
    Prior to my Ph.D., I received my M.S. degree from the University of Southern California. 
    I also have 2 years of industry experience as a Data Scientist at Baidu.
  </p>
  <p>
    My research focuses on 3D Vision and World Model.
  </p>

